<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>尼克出版社</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --ink: #1e293b;
        --navy: #1a1a2e;
        --blue: #1e3a5f;
        --paper: #fdfaf6;
        --muted: #6b7280;
        --sand: #c4b8a8;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-width: 320px;
        background: var(--paper);
        color: #374151;
        font-family: "Microsoft JhengHei", Arial, sans-serif;
      }

      .heading-font {
        font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
        font-weight: 700;
      }

      .navbar {
        background: rgba(20, 30, 50, .92);
        backdrop-filter: blur(8px);
      }

      .navbar-brand,
      .navbar .nav-link {
        color: #fff;
      }

      .navbar-brand {
        letter-spacing: .04em;
      }

      .navbar .nav-link {
        opacity: .86;
      }

      .navbar .nav-link:hover,
      .navbar .nav-link:focus {
        color: #fff;
        opacity: 1;
      }

      .hero-slide {
        height: 70vh;
        min-height: 460px;
        object-fit: cover;
      }

      .carousel-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, .4);
      }

      .carousel-overlay h2 {
        margin: 0;
        color: #fff;
        font-size: clamp(2rem, 4vw, 3.2rem);
        text-align: center;
      }

      .section-title {
        color: var(--ink);
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .about-img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
      }

      .about-text {
        color: #374151;
        font-size: 1.06rem;
        line-height: 2;
      }

      .products-section {
        background: #fff;
      }

      .product-card {
        border: 0;
        border-radius: 10px;
        overflow: hidden;
        transition: transform .3s ease, box-shadow .3s ease;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 1rem 2rem rgba(30, 41, 59, .12) !important;
      }

      .product-img {
        height: 240px;
        object-fit: cover;
      }

      .product-card .card-title {
        min-height: 3rem;
        color: var(--ink);
        font-size: 1.02rem;
      }

      .product-card .card-text {
        min-height: 4.2rem;
        color: var(--muted);
      }

      .price-badge {
        background: var(--blue);
        color: #fff;
        font-weight: 400;
      }

      .site-footer {
        background: var(--navy);
        color: var(--sand);
      }

      .site-footer h5 {
        color: #f5f0e8;
      }

      .social-link {
        display: inline-flex;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(245, 240, 232, .45);
        border-radius: 50%;
        color: #f5f0e8;
        font-weight: 700;
        text-decoration: none;
      }

      .social-link:hover,
      .social-link:focus {
        background: #f5f0e8;
        color: var(--navy);
      }

      .footer-rule {
        border-color: rgba(245, 240, 232, .3);
      }

      .copyright {
        color: #7a7a8a;
      }

      @media (max-width: 767.98px) {
        .hero-slide {
          height: 62vh;
          min-height: 380px;
        }

        .product-card .card-title,
        .product-card .card-text {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand heading-font" href="#">尼克出版社</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="切換導覽">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#about">關於我們</a></li>
            <li class="nav-item"><a class="nav-link" href="#products">書籍</a></li>
            <li class="nav-item"><a class="nav-link" href="#footer">聯絡</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <header>
      <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="第一張"></button>
          <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1" aria-label="第二張"></button>
          <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2" aria-label="第三張"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="images/hero-reading.jpg" class="hero-slide d-block w-100" alt="溫暖光線下的書桌與翻開的書本">
            <div class="carousel-overlay">
              <h2 class="heading-font">thanks </h2>
            </div>
          </div>
          
            </div>
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">上一張</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">下一張</span>
        </button>
      </div>
    </header>



    <footer id="footer" class="site-footer py-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-md-4">
            <h5 class="heading-font mb-3">尼克出版社 Nick Publishing</h5>
            <p class="small mb-2">台北市中正區重慶南路一段88號3樓</p>
            <p class="small mb-2">02-2381-6688</p>
            <p class="small mb-0">service@nicknick.com.tw</p>
          </div>
          <div class="col-md-4">
            <h5 class="fw-bold mb-3">服務時間</h5>
            <p class="small mb-0">週一至週五 09:00 - 18:00</p>
          </div>
          <div class="col-md-4">
            <h5 class="fw-bold mb-3">追蹤我們</h5>
            <div class="d-flex gap-3">
              <a class="social-link" href="#" aria-label="Facebook">f</a>
              <a class="social-link" href="#" aria-label="Instagram">◎</a>
              <a class="social-link" href="#" aria-label="YouTube">▶</a>
            </div>
          </div>
        </div>
        <hr class="footer-rule my-4">
        <p class="copyright text-center small mb-0">© 2026 尼克出版社 Nick Publishing. All rights reserved.</p>
      </div>
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
